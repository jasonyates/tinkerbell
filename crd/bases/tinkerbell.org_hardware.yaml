---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  labels:
    clusterctl.cluster.x-k8s.io: ""
    clusterctl.cluster.x-k8s.io/move: ""
  name: hardware.tinkerbell.org
spec:
  group: tinkerbell.org
  names:
    categories:
    - tinkerbell
    kind: Hardware
    listKind: HardwareList
    plural: hardware
    shortNames:
    - hw
    singular: hardware
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.state
      name: State
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Hardware is the Schema for the Hardware API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HardwareSpec defines the desired state of Hardware.
            properties:
              agentID:
                description: |-
                  AgentID is the unique identifier an Agent uses that is associated with this Hardware.
                  This is used to identify Hardware during the discovery and enrollment process.
                  It is typically the MAC address of the primary network interface.
                type: string
              auto:
                description: Auto is the configuration for the automatic capabilities.
                properties:
                  enrollmentEnabled:
                    default: false
                    description: |-
                      EnrollmentEnabled enables automatic enrollment of the Hardware.
                      When set to true, auto enrollment will create Workflows for this Hardware.
                    type: boolean
                type: object
              bmcRef:
                description: |-
                  BMCRef contains a relation to a BMC state management type in the same
                  namespace as the Hardware. This may be used for BMC management by
                  orchestrators.
                properties:
                  apiGroup:
                    description: |-
                      APIGroup is the group for the resource being referenced.
                      If APIGroup is not specified, the specified Kind must be in the core API group.
                      For any other third-party types, APIGroup is required.
                    type: string
                  kind:
                    description: Kind is the type of resource being referenced
                    type: string
                  name:
                    description: Name is the name of resource being referenced
                    type: string
                required:
                - kind
                - name
                type: object
                x-kubernetes-map-type: atomic
              disks:
                items:
                  description: Disk represents a disk device for Tinkerbell Hardware.
                  properties:
                    device:
                      type: string
                  type: object
                type: array
              interfaces:
                items:
                  description: Interface represents configuration related to a network
                    interface.
                  properties:
                    dhcp:
                      description: DHCP configuration.
                      properties:
                        arch:
                          type: string
                        boot_file_name:
                          description: |-
                            BootFileName is the boot file name (DHCP option 67).
                            Used for explicit boot file configuration, required by some network boot clients
                            like NVIDIA NVOS switches.
                            If specified, TFTPServerName must also be specified.
                          type: string
                        classless_static_routes:
                          description: ClasslessStaticRoutes defines static routes
                            to be sent via DHCP option 121 (RFC 3442).
                          items:
                            description: ClasslessStaticRoute represents a classless
                              static route for DHCP option 121 (RFC 3442).
                            properties:
                              destination_descriptor:
                                description: |-
                                  DestinationDescriptor is the network address and prefix length.
                                  The format is "network/prefixlength", e.g., "192.168.1.0/24" or "10.0.0.0/8".
                                pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/(3[0-2]|[12]?[0-9])$
                                type: string
                              router:
                                description: Router is the IP address of the router
                                  for this route.
                                pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
                                type: string
                            required:
                            - destination_descriptor
                            - router
                            type: object
                          type: array
                        domain_name:
                          type: string
                        hostname:
                          type: string
                        iface_name:
                          type: string
                        ip:
                          description: IP configuration.
                          properties:
                            address:
                              type: string
                            family:
                              format: int64
                              type: integer
                            gateway:
                              type: string
                            netmask:
                              type: string
                          type: object
                        lease_time:
                          format: int64
                          type: integer
                        mac:
                          pattern: ([0-9a-f]{2}[:]){5}([0-9a-f]{2})
                          type: string
                        name_servers:
                          items:
                            type: string
                          type: array
                        tftp_server_name:
                          description: |-
                            TFTPServerName is the TFTP server name or IP address (DHCP option 66).
                            Used for explicit TFTP server configuration, required by some network boot clients
                            like NVIDIA NVOS switches.
                            If specified, BootFileName must also be specified.
                          type: string
                        time_servers:
                          items:
                            type: string
                          type: array
                        uefi:
                          type: boolean
                        vlan_id:
                          description: validation pattern for VLANDID is a string
                            number between 0-4096
                          pattern: ^(([0-9][0-9]{0,2}|[1-3][0-9][0-9][0-9]|40([0-8][0-9]|9[0-6]))(,[1-9][0-9]{0,2}|[1-3][0-9][0-9][0-9]|40([0-8][0-9]|9[0-6]))*)$
                          type: string
                      type: object
                      x-kubernetes-validations:
                      - message: TFTPServerName and BootFileName must both be specified
                          or both be empty
                        rule: (has(self.tftp_server_name) && self.tftp_server_name
                          != "") == (has(self.boot_file_name) && self.boot_file_name
                          != "")
                    disableDhcp:
                      default: false
                      description: DisableDHCP disables DHCP for this interface.
                      type: boolean
                    isoboot:
                      description: Isoboot configuration.
                      properties:
                        sourceISO:
                          description: |-
                            SourceISO is the source url where HookOS, an Operating System Installation Environment (OSIE), ISO lives.
                            It must be a valid url.URL{} object and must have a url.URL{}.Scheme of HTTP or HTTPS.
                          format: uri
                          type: string
                      type: object
                    netboot:
                      description: Netboot configuration.
                      properties:
                        allowPXE:
                          type: boolean
                        allowWorkflow:
                          type: boolean
                        ipxe:
                          description: IPXE configuration.
                          properties:
                            binary:
                              description: |-
                                Binary, when defined, overrides Smee's default mapping of architecture to iPXE binary.
                                The following binary names are supported:
                                - undionly.kpxe
                                - ipxe.efi
                                - snp-arm64.efi
                                - snp-x86_64.efi
                                See the iPXE Architecture Mapping documentation for more details.
                              type: string
                            contents:
                              type: string
                            url:
                              type: string
                          type: object
                        osie:
                          description: OSIE configuration.
                          properties:
                            baseURL:
                              type: string
                            initrd:
                              type: string
                            kernel:
                              type: string
                          type: object
                      type: object
                  type: object
                type: array
              metadata:
                properties:
                  bonding_mode:
                    format: int64
                    type: integer
                  custom:
                    properties:
                      preinstalled_operating_system_version:
                        properties:
                          distro:
                            type: string
                          image_tag:
                            type: string
                          os_slug:
                            type: string
                          slug:
                            type: string
                          version:
                            type: string
                        type: object
                      private_subnets:
                        items:
                          type: string
                        type: array
                    type: object
                  facility:
                    properties:
                      facility_code:
                        type: string
                      plan_slug:
                        type: string
                      plan_version_slug:
                        type: string
                    type: object
                  instance:
                    properties:
                      allow_pxe:
                        type: boolean
                      always_pxe:
                        type: boolean
                      console:
                        description: |-
                          MetadataInstanceConsole controls the serial console tty/baud
                          applied to the installed OS by the serial-console action.
                        properties:
                          baud:
                            type: integer
                          tty:
                            type: string
                        type: object
                      crypted_root_password:
                        type: string
                      hostname:
                        type: string
                      id:
                        type: string
                      ips:
                        items:
                          properties:
                            address:
                              type: string
                            family:
                              format: int64
                              type: integer
                            gateway:
                              type: string
                            management:
                              type: boolean
                            netmask:
                              type: string
                            public:
                              type: boolean
                          type: object
                        type: array
                      ipxe_script_url:
                        type: string
                      network:
                        description: |-
                          MetadataInstanceNetwork exposes per-interface network configuration, modelled on
                          AWS EC2 instance metadata's network key (API version 2011-01-01 onward).
                          It is consumed by the tootles EC2 IMDS frontend so cloud-init's EC2 datasource
                          can configure NICs from IMDS.
                        properties:
                          interfaces:
                            description: |-
                              MetadataInstanceNetworkInterfaces groups per-interface configuration under
                              the IMDS /meta-data/network/interfaces/ path. Currently only Macs is
                              populated; the wrapper preserves room for non-MAC-keyed siblings without
                              a breaking schema change.
                            properties:
                              macs:
                                additionalProperties:
                                  description: |-
                                    MetadataInstanceNetworkInterface holds the per-NIC fields served at
                                    /meta-data/network/interfaces/macs/{mac}/. Scalar pointer fields
                                    distinguish "not set" (served as HTTP 404 by the IMDS frontend) from
                                    "set to empty string" (served as 200 with empty body). Slice fields use
                                    nil vs non-nil for the same distinction.
                                  properties:
                                    device-number:
                                      format: int64
                                      type: integer
                                    interface-id:
                                      type: string
                                    ipv6s:
                                      items:
                                        type: string
                                      type: array
                                    local-hostname:
                                      type: string
                                    local-ipv4s:
                                      items:
                                        type: string
                                      type: array
                                    mac:
                                      description: |-
                                        Mac is the value served at .../{mac}/mac. Deliberately not auto-derived
                                        from the map key: if unset, the IMDS handler returns 404 for that leaf.
                                      type: string
                                    public-hostname:
                                      type: string
                                    public-ipv4s:
                                      items:
                                        type: string
                                      type: array
                                    subnet-ipv4-cidr-block:
                                      type: string
                                    subnet-ipv6-cidr-blocks:
                                      items:
                                        type: string
                                      type: array
                                    vpc-ipv4-cidr-blocks:
                                      items:
                                        type: string
                                      type: array
                                    vpc-ipv6-cidr-blocks:
                                      items:
                                        type: string
                                      type: array
                                  type: object
                                description: |-
                                  Macs maps lowercase, colon-separated MAC addresses (e.g. "02:aa:bb:cc:dd:ee")
                                  to their per-interface configuration. The key is the URL segment used in the
                                  IMDS tree at /meta-data/network/interfaces/macs/{mac}/.
                                type: object
                            type: object
                        type: object
                      network_ready:
                        type: boolean
                      operating_system:
                        properties:
                          distro:
                            type: string
                          image_tag:
                            type: string
                          os_slug:
                            type: string
                          slug:
                            type: string
                          version:
                            type: string
                        type: object
                      rescue:
                        type: boolean
                      ssh_keys:
                        items:
                          type: string
                        type: array
                      sshd:
                        description: |-
                          MetadataInstanceSSHD configures global sshd_config behaviour
                          independently of per-user identity. Leave fields unset
                          (PermitRootLogin empty, PasswordAuthentication nil) to inherit
                          the distro default.
                        properties:
                          password_authentication:
                            type: boolean
                          permit_root_login:
                            type: string
                        type: object
                      state:
                        type: string
                      storage:
                        properties:
                          disks:
                            items:
                              properties:
                                device:
                                  type: string
                                partitions:
                                  items:
                                    properties:
                                      label:
                                        type: string
                                      number:
                                        format: int64
                                        type: integer
                                      size:
                                        format: int64
                                        type: integer
                                      start:
                                        format: int64
                                        type: integer
                                      type_guid:
                                        type: string
                                    type: object
                                  type: array
                                wipe_table:
                                  type: boolean
                              type: object
                            type: array
                          filesystems:
                            items:
                              properties:
                                mount:
                                  properties:
                                    create:
                                      properties:
                                        force:
                                          type: boolean
                                        options:
                                          items:
                                            type: string
                                          type: array
                                      type: object
                                    device:
                                      type: string
                                    files:
                                      items:
                                        properties:
                                          contents:
                                            type: string
                                          gid:
                                            format: int64
                                            type: integer
                                          mode:
                                            format: int64
                                            type: integer
                                          path:
                                            type: string
                                          uid:
                                            format: int64
                                            type: integer
                                        type: object
                                      type: array
                                    format:
                                      type: string
                                    point:
                                      type: string
                                  type: object
                              type: object
                            type: array
                          raid:
                            items:
                              properties:
                                devices:
                                  items:
                                    type: string
                                  type: array
                                level:
                                  type: string
                                name:
                                  type: string
                                spare:
                                  format: int64
                                  type: integer
                              type: object
                            type: array
                          volume_groups:
                            items:
                              description: |-
                                MetadataInstanceStorageVolumeGroup describes a single LVM volume group.
                                Field names and JSON tags match rootio's storage.VolumeGroup type exactly.
                              properties:
                                logical_volumes:
                                  items:
                                    description: |-
                                      MetadataInstanceStorageLogicalVolume describes a single LV inside a VG.
                                      Size is in bytes; 0 means "use 100%FREE" (only valid on the last LV in a VG).
                                    properties:
                                      name:
                                        type: string
                                      opts:
                                        items:
                                          type: string
                                        type: array
                                      size:
                                        format: int64
                                        type: integer
                                      tags:
                                        items:
                                          type: string
                                        type: array
                                    type: object
                                  type: array
                                name:
                                  type: string
                                physical_volumes:
                                  items:
                                    type: string
                                  type: array
                                tags:
                                  items:
                                    type: string
                                  type: array
                              type: object
                            type: array
                        type: object
                      tags:
                        items:
                          type: string
                        type: array
                      userdata:
                        type: string
                      users:
                        items:
                          description: |-
                            MetadataInstanceUser is an additional (non-root) user the
                            user-manage action creates on the installed OS. Username is
                            required; other fields are applied only when set.
                          properties:
                            crypted_password:
                              type: string
                            shell:
                              type: string
                            ssh_authorized_keys:
                              items:
                                type: string
                              type: array
                            sudo:
                              type: boolean
                            username:
                              type: string
                          required:
                          - username
                          type: object
                        type: array
                    type: object
                  manufacturer:
                    properties:
                      id:
                        type: string
                      slug:
                        type: string
                    type: object
                  state:
                    type: string
                type: object
              references:
                additionalProperties:
                  properties:
                    group:
                      description: |-
                        Group of the referent.
                        More info: https://kubernetes.io/docs/reference/using-api/#api-groups
                      type: string
                    name:
                      description: |-
                        Name of the referent.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                    namespace:
                      description: |-
                        Namespace of the referent.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                      type: string
                    resource:
                      description: |-
                        Resource of the referent. Must be the pluralized kind of the referent. Must be all lowercase.
                        More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                      type: string
                    version:
                      description: |-
                        API version of the referent.
                        More info: https://kubernetes.io/docs/reference/using-api/#api-versioning
                      type: string
                  type: object
                description: |-
                  References allows for linking custom resource objects of any kind to this Hardware object.
                  These are available in Templates for templating. They are referenced by the name of the reference.
                  For example, given a reference with the name "lvm", you can access it in a template with .references.lvm.
                type: object
              resources:
                additionalProperties:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                description: |-
                  Resources represents known resources that are available on a machine.
                  Resources may be used for scheduling by orchestrators.
                type: object
              tinkVersion:
                format: int64
                type: integer
              userData:
                description: |-
                  UserData is the user data to configure in the hardware's
                  metadata
                type: string
              vendorData:
                description: |-
                  VendorData is the vendor data to configure in the hardware's
                  metadata
                type: string
            type: object
          status:
            description: HardwareStatus defines the observed state of Hardware.
            properties:
              state:
                description: HardwareState represents the hardware state.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
