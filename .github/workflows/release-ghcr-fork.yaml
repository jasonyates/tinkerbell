name: Release (GHCR fork)
on:
  push:
    branches:
      - main
      - revert/tootles-network-metadata
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.24"

jobs:
  build:
    name: Build and publish tinkerbell image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache: true

      - name: Compile linux/amd64 binary
        run: |
          mkdir -p out
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" -o out/tinkerbell-linux-amd64 ./cmd/tinkerbell

      - name: Sanitize branch name for tag
        id: br
        run: echo "name=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tinkerbell
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.br.outputs.name }}
            ${{ github.ref_name == 'main' && format('{0}:latest', env.IMAGE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
